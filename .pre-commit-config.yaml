repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/
  - repo: local
    hooks:
      - id: check-agent-docs
        name: Check AGENTS.md and CLAUDE.md stay in sync
        entry: node scripts/sync-agent-docs.mjs --check
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|CLAUDE\.md|scripts/sync-agent-docs\.mjs|package\.json)$
