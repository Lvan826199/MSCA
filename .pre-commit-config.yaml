repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/
  - repo: local
    hooks:
      - id: check-agent-docs
        name: Check AGENTS.md points to CLAUDE.md
        entry: node scripts/check-agent-entry.mjs
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|CLAUDE\.md|scripts/check-agent-entry\.mjs|package\.json)$
